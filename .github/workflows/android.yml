name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # बिना कोड बदले, KSP कंपाइलर को शांत करने के लिए वर्चुअल डिस्प्ले स्क्रीन चालू करके बिल्ड करना
    - name: Build Debug APK WITH Xvfb
      run: |
        sudo apt-get update && sudo apt-get install -y xvfb
        xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" ./gradlew clean assembleDebug \
          --no-build-cache \
          --no-configuration-cache \
          --no-daemon \
          --stacktrace \
          -Pkotlin.compiler.execution.strategy=in-process \
          -Pksp.incremental=false
          
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
