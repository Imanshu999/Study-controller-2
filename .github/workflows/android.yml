name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. एरर 65 को खत्म करने के लिए JDK 21 का इस्तेमाल
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # 2. रूट डायरेक्टरी में गायब gradlew को रनटाइम पर फ्रेश बनाना (Version 8.5 जो Java 21 को सपोर्ट करे)
    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    # 3. ऑफिशियल ग्रेडल एक्शन जो एनवायरनमेंट को जावा 21 के साथ सिंक करेगा
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # 4. क्लीन और फ्रेश बिल्ड कमांड
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
