name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # जावा 17 पर वापस सेट किया है क्योंकि ऑफिशियल एक्शन इसे ऑटो-मैनेज करेगा
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # रूट में गायब gradlew को रनटाइम पर फ्रेश जेनरेट करना
    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    # ऑफिशियल ग्रेडल एक्शन जो कैशे और एनवायरनमेंट मिसमैच को खुद ठीक करता है
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # फ्रेश एनवायरनमेंट के साथ क्लीन असेंबल बिल्ड रन करना
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
