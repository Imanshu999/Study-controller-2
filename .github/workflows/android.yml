name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # आपके प्रोजेक्ट के एंड्रॉइड प्लगइन्स के साथ सबसे ज्यादा मैच करने वाला स्टेबल ग्रेडल वर्ज़न (8.0)
    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.0
        chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # --quiet फ्लैग फालतू के लंबे स्टैक ट्रेस को हटाकर केवल असली एरर लाइन दिखाएगा
    - name: Build Debug APK
      run: ./gradlew assembleDebug --quiet

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
