name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  _JAVA_OPTIONS: "-Djava.awt.headless=true -Didea.home.path=/tmp"
  GRADLE_OPTS: "-Djava.awt.headless=true -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # --max-workers=1 के साथ KSP के बैकग्राउंड थ्रेड टकराव को पूरी तरह रोक रहे हैं
    - name: Build Debug APK
      run: |
        ./gradlew clean assembleDebug \
          --no-build-cache \
          --no-configuration-cache \
          --no-daemon \
          --stacktrace \
          --max-workers=1 \
          -Pkotlin.compiler.execution.strategy=in-process \
          -Pksp.incremental=false
          
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
