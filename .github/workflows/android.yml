name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # --stacktrace के साथ -Pandroid.experimental.r8.disablebuiltininliner=true फ्लैग जोड़ा है 
    # ताकि प्लगइन इनलाइनिंग की दिक्कतों को पकड़ा जा सके
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace -Pandroid.experimental.r8.disablebuiltininliner=true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
