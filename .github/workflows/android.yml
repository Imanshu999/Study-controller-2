name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # रनर एनवायरनमेंट में सीधे एक नया और फ्रेश gradle wrapper जेनरेट करना
    - name: Setup Gradle Wrapper
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle
        gradle wrapper

    # अब इसे बिना किसी पाथ एरर के परमिशन मिल जाएगी
    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # बिना पुराना कैशे यूज़ किए फ्रेश बिल्ड करना
    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
