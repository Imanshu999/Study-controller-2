name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # रूट डायरेक्टरी में मौजूद gradlew फाइल को सीधे एग्जीक्यूटिव परमिशन देना
    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x ./gradlew

    # जेमिनी API की के लिए .env फाइल बनाना
    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # क्लीन बिल्ड रन करना ताकि कोई पुराना कैशे एरर न आए
    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
